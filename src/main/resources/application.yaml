spring:
  application:
    name: ticketing-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/ticketing_db
    username: postgres
    password: postgres

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_USERNAME}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true




server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  success-url: http://localhost:5173/payment-success
  cancel-url: http://localhost:5173/payment-cancel
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

